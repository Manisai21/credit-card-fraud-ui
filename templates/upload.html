<!-- credit-card-fraud-ui/templates/upload.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload Dataset</title>
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0/css/bootstrap.min.css">
    <style>
        body {
            background: linear-gradient(to right, #e0f7fa, #ffffff);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }
        h1 {
            font-size: 3rem;
            margin-bottom: 20px;
            color: #00796b;
        }
        .form-container {
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
            max-width: 800px;
            background-color: #ffffff;
            padding: 30px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            border-radius: 8px;
        }
        .form-description {
            flex: 1;
            margin-right: 20px;
            color: #004d40;
        }
        .form-group {
            margin-bottom: 15px;
        }
        .btn-group {
            display: flex;
            gap: 10px;
        }
        .btn {
            background-color: #00796b;
            color: #ffffff;
            border: none;
            transition: background-color 0.3s ease;
        }
        .btn:hover {
            background-color: #004d40;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Upload Dataset</h1>
        <div class="form-container">
            <div class="form-description">
                <p>Here you can upload your dataset in CSV or JSON format. Choose the source of your file and proceed to upload. Once uploaded, you can predict or analyze the data.</p>
            </div>
            <form action="{{ url_for('upload_dataset') }}" method="POST" enctype="multipart/form-data">
                <div class="form-group">
                    <label for="file-source">Select File Source:</label>
                    <select id="file-source" name="file-source" class="form-control" onchange="toggleFileInput()">
                        <option value="local">From Local</option>
                        <option value="gdrive">From Google Drive</option>
                    </select>
                </div>

                <div id="local-file-input" class="form-group">
                    <label for="file">Choose file:</label>
                    <input type="file" name="file" id="file" class="form-control">
                </div>

                <div id="gdrive-file-input" class="form-group" style="display: none;">
                    <label for="gdrive-link">Enter Google Drive File Link:</label>
                    <input type="text" name="gdrive-link" id="gdrive-link" class="form-control" placeholder="Google Drive link">
                </div>

                <div class="btn-group">
                    <button type="submit" class="btn">Upload</button>
                    <button type="button" class="btn">Predict</button>
                    <button type="button" class="btn">Analyze</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        function toggleFileInput() {
            const source = document.getElementById('file-source').value;
            document.getElementById('local-file-input').style.display = source === 'local' ? 'block' : 'none';
            document.getElementById('gdrive-file-input').style.display = source === 'gdrive' ? 'block' : 'none';
        }
    </script>
</body>
</html>
